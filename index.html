<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UC02 | Nexus Software House v3</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar" aria-label="Navegação principal">
    <div class="brand">
      <span class="brand-mark">NX</span>
      <div>
        <strong>Nexus</strong>
        <small>Software House v3</small>
      </div>
    </div>
    <nav id="menu">
      <button class="active" data-tab="dashboard" type="button">Dashboard</button>
      <button data-tab="sprints" type="button">Sprints</button>
      <button data-tab="clientes" type="button">Clientes</button>
      <button data-tab="eventos" type="button">Eventos</button>
      <button data-tab="biblioteca" type="button">Biblioteca</button>
      <button data-tab="avaliacao" type="button">Avaliação</button>
    </nav>
    <div class="side-card">
      <small>Status da UC</small>
      <strong id="sideSprint">Sprint 07</strong>
      <span>Execução ágil no Jira</span>
    </div>
  </aside>

  <main class="app">
    <header class="topbar">
      <div>
        <span class="eyebrow">UC02 · Técnico em Desenvolvimento de Sistemas</span>
        <h1>Portal do Consultor</h1>
        <p>Ambiente corporativo da Nexus para conduzir as 15 Sprints da UC02, integrando slides, clientes, Jira, Teams, eventos e avaliação.</p>
      </div>
      <div class="top-actions">
        <a class="admin-link" href="admin.html">Configuração</a>
        <button onclick="window.print()" type="button">Salvar PDF</button>
      </div>
    </header>

    <section id="dashboard" class="tab-panel active"></section>
    <section id="sprints" class="tab-panel"></section>
    <section id="clientes" class="tab-panel"></section>
    <section id="eventos" class="tab-panel"></section>
    <section id="biblioteca" class="tab-panel"></section>
    <section id="avaliacao" class="tab-panel"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="config.js"></script>
  <script src="data/sprints.js"></script>
  <script src="data/clients.js"></script>
  <script src="data/library.js"></script>
  <script src="data/events.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
